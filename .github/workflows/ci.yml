# Build + typecheck + SBOM. Least-privilege by default (docs/SECURITY.md §7).
# Every `uses:` is pinned to a full commit SHA (SLSA / OpenSSF Scorecard); the
# trailing comment records the human-readable version it corresponds to.
name: ci

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - run: npm test --if-present

  sbom:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "20"
      - run: npm ci
      # CycloneDX SBOM published as a build artifact (docs/SECURITY.md §7).
      - run: npx --yes @cyclonedx/cyclonedx-npm --output-file sbom.cdx.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom
          path: sbom.cdx.json

  # Deploys use OIDC to assume a scoped AWS role — NO long-lived access keys.
  # Runs only on tagged releases. Set the DEPLOY_ROLE_ARN repo variable to the
  # pre-created addressium-deploy role, then the credential + deploy steps run.
  deploy:
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC — mint a short-lived token to assume the AWS role
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Configure AWS credentials via OIDC
        if: vars.DEPLOY_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: ${{ vars.DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - name: Deploy the control-plane stack
        if: vars.DEPLOY_ROLE_ARN != ''
        run: npx cdk deploy --require-approval never
        working-directory: infra/cdk
