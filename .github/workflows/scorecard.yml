# OpenSSF Scorecard — publishes a supply-chain health score (docs/SECURITY.md §7).
# Every `uses:` is pinned to a full commit SHA (SLSA / OpenSSF Scorecard); the
# trailing comment records the human-readable version it corresponds to.
name: scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "18 4 * * 2"
  push:
    branches: ["main"]

permissions: read-all

jobs:
  analysis:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@99c09fe975337306107572b4fdf4db224cf8e2f2 # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - uses: github/codeql-action/upload-sarif@b7351df727350dca84cb9d725d57dcf5bc82ba26 # v3.37.1
        with:
          sarif_file: results.sarif
