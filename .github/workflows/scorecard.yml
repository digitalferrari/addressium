# OpenSSF Scorecard — publishes a supply-chain health score (docs/SECURITY.md §7).
# Every `uses:` is pinned to a full commit SHA (SLSA / OpenSSF Scorecard); the
# trailing comment records the human-readable version it corresponds to.
name: scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "18 4 * * 2"
  push:
    branches: ["main"]

permissions: read-all

jobs:
  analysis:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - uses: github/codeql-action/upload-sarif@b7351df727350dca84cb9d725d57dcf5bc82ba26 # v3.37.1
        with:
          sarif_file: results.sarif
